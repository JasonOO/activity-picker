<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>随心选轮盘</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="随心选">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: #f8fafc;
        }
        .canvas-container { filter: drop-shadow(0 15px 30px rgba(0,0,0,0.12)); }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const defaultItems = ['桌球', '射击', '网球', '东钱湖骑车', '密室', '剧本杀', '按摩', '脱口秀', '爬山徒步'];
            
            // 数据持久化
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('picker_v3_data');
                return saved ? JSON.parse(saved) : defaultItems;
            });
            
            const [newItem, setNewItem] = useState('');
            const [isSpinning, setIsSpinning] = useState(false);
            const [winner, setWinner] = useState(null);
            const [showConfig, setShowConfig] = useState(false);
            const [rotation, setRotation] = useState(0);
            
            const canvasRef = useRef(null);
            const animationRef = useRef(null);

            // 莫兰迪色系，更具质感
            const colors = ['#84a59d', '#f7ede2', '#f5cac3', '#f6bd60', '#f28482', '#99e2b4', '#90dbf4', '#b197fc'];

            useEffect(() => {
                localStorage.setItem('picker_v3_data', JSON.stringify(items));
                drawWheel();
            }, [items, rotation]);

            const drawWheel = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const size = canvas.width;
                const centerX = size / 2;
                const centerY = size / 2;
                const radius = size / 2 - 10;

                ctx.clearRect(0, 0, size, size);
                const arc = (2 * Math.PI) / items.length;

                items.forEach((item, i) => {
                    const angle = i * arc + (rotation * Math.PI) / 180;
                    ctx.beginPath();
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, angle, angle + arc);
                    ctx.lineTo(centerX, centerY);
                    ctx.fill();

                    // 文字样式
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(angle + arc / 2);
                    ctx.textAlign = 'right';
                    ctx.fillStyle = (colors[i % colors.length] === '#f7ede2') ? '#475569' : 'white';
                    ctx.font = 'bold 15px sans-serif';
                    const displayItem = item.length > 7 ? item.substring(0, 6) + '..' : item;
                    ctx.fillText(displayItem, radius - 25, 6);
                    ctx.restore();
                });

                // 中心装饰
                ctx.beginPath();
                ctx.arc(centerX, centerY, 12, 0, 2 * Math.PI);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
            };

            const spin = () => {
                if (isSpinning || items.length === 0) return;
                setIsSpinning(true);
                setWinner(null);

                const spinDuration = 3000;
                const extraDegrees = 1800 + Math.random() * 360; 
                const startRotation = rotation;
                const endRotation = startRotation + extraDegrees;
                const startTime = performance.now();

                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / spinDuration, 1);
                    const easeOut = (t) => 1 - Math.pow(1 - t, 5); // 更丝滑的减速
                    const currentRotation = startRotation + (endRotation - startRotation) * easeOut(progress);
                    setRotation(currentRotation);

                    if (progress < 1) {
                        animationRef.current = requestAnimationFrame(animate);
                    } else {
                        setIsSpinning(false);
                        const finalRotation = currentRotation % 360;
                        const arcDegrees = 360 / items.length;
                        const index = Math.floor((360 - (finalRotation % 360)) / arcDegrees) % items.length;
                        setWinner(items[index]);
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                };
                animationRef.current = requestAnimationFrame(animate);
            };

            return (
                <div className="h-screen w-screen flex flex-col safe-top safe-bottom">
                    {/* Header */}
                    <div className="flex justify-between items-center px-8 py-6">
                        <div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">随心选</h1>
                            <p className="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Select your vibe</p>
                        </div>
                        <button onClick={() => setShowConfig(true)} className="p-3 bg-white rounded-2xl shadow-sm border border-slate-100 active:scale-90 transition-transform">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                        </button>
                    </div>

                    {/* Wheel Area */}
                    <div className="flex-1 flex flex-col items-center justify-center px-6">
                        <div className="relative canvas-container">
                            <div className="absolute -right-3 top-1/2 -translate-y-1/2 z-20">
                                <div className="w-0 h-0 border-y-[12px] border-y-transparent border-r-[24px] border-r-slate-800"></div>
                            </div>
                            <canvas ref={canvasRef} width={340} height={340} className="rounded-full" />
                        </div>

                        <div className="h-28 flex flex-col items-center justify-center mt-6">
                            {winner && !isSpinning ? (
                                <div className="text-center animate-bounce">
                                    <h2 className="text-4xl font-black text-indigo-600">{winner}</h2>
                                    <span className="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase mt-2 block">SELECTED ITEM</span>
                                </div>
                            ) : (
                                <p className="text-slate-300 font-bold tracking-tight">
                                    {isSpinning ? "寻找灵感中..." : "点击下方按钮开始"}
                                </p>
                            )}
                        </div>
                    </div>

                    {/* Footer Button */}
                    <div className="px-10 pb-16">
                        <button onClick={spin} disabled={isSpinning || items.length === 0}
                            className={`w-full py-5 rounded-[2rem] text-xl font-black transition-all active:scale-95 shadow-2xl ${isSpinning ? 'bg-slate-100 text-slate-300' : 'bg-slate-900 text-white shadow-slate-200'}`}>
                            {isSpinning ? 'SPINNING...' : '开始旋转'}
                        </button>
                    </div>

                    {/* Config Page */}
                    {showConfig && (
                        <div className="absolute inset-0 bg-white z-50 flex flex-col animate-slide">
                            <div className="safe-top flex justify-between items-center p-8">
                                <h2 className="text-3xl font-black text-slate-900">清单</h2>
                                <button onClick={() => setShowConfig(false)} className="w-12 h-12 flex items-center justify-center bg-slate-100 rounded-full">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                </button>
                            </div>
                            
                            <div className="px-8 flex-1 overflow-hidden flex flex-col">
                                <div className="flex gap-3 mb-6">
                                    <input type="text" value={newItem} onChange={(e) => setNewItem(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && (setItems([...items, newItem]), setNewItem(''))}
                                        placeholder="输入新项目..." className="flex-1 px-6 py-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-700"/>
                                    <button onClick={() => {if(newItem) setItems([...items, newItem]); setNewItem('')}} className="bg-indigo-600 text-white w-16 rounded-2xl font-bold text-2xl">+</button>
                                </div>

                                <div className="flex-1 overflow-y-auto space-y-3 pb-20">
                                    {items.map((item, index) => (
                                        <div key={index} className="flex items-center justify-between p-5 bg-slate-50 rounded-2xl">
                                            <span className="font-bold text-slate-700">{item}</span>
                                            <button onClick={() => setItems(items.filter((_, i) => i !== index))} className="text-slate-300 active:text-red-500">
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="p-8 bg-white border-t border-slate-50 flex gap-4">
                                <button onClick={() => {if(confirm('重置为默认？')) setItems(defaultItems)}} className="px-6 py-4 text-slate-300 font-bold">重置</button>
                                <button onClick={() => setShowConfig(false)} className="flex-1 bg-slate-900 text-white py-5 rounded-[1.8rem] font-black">完成</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
